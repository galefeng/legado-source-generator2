<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legado 书源生成器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Legado 书源生成器</h1>
      <div class="header-meta">
        <input type="text" id="bookSourceName" placeholder="书源名称" class="input-name">
        <input type="text" id="bookSourceUrl" placeholder="书源网站URL" class="input-url">
        <input type="text" id="searchUrl" placeholder="搜索页URL (如: {{key}})" class="input-url">
      </div>
    </header>

    <div class="rule-type-tabs" id="modeTabs"></div>
    <div class="rule-type-tabs" id="ruleTypeTabs"></div>

    <!-- Explore URL Visual Editor -->
    <div id="exploreUrlEditor" class="explore-editor hidden">
      <div class="editor-toolbar">
        <button id="exploreCollectBtn" class="btn btn-action">从页面收集元素</button>
        <button id="exploreAddItemBtn" class="btn btn-action">手动添加</button>
        <button id="exploreAddSeparatorBtn" class="btn btn-action">插入分隔</button>
        <button id="exploreExportBtn" class="btn btn-action">导出 JSON</button>
      </div>
      <div class="editor-layout">
        <div class="editor-cards" id="exploreCards">
          <!-- Cards rendered here -->
        </div>
        <div class="editor-props" id="exploreProps">
          <div class="props-placeholder">选择卡片编辑样式</div>
        </div>
      </div>
      <div id="exploreJsonModal" class="modal hidden">
        <div class="modal-content">
          <h3>发现页 URL JSON</h3>
          <textarea id="exploreJsonOutput" readonly></textarea>
          <div class="modal-actions">
            <button id="exploreCopyBtn" class="btn btn-primary">复制到剪贴板</button>
            <button id="exploreCloseModalBtn" class="btn btn-secondary">关闭</button>
          </div>
        </div>
      </div>
      <div class="explore-preview-box">
        <div class="explore-preview-header">
          <label>发现页 URL 预览</label>
          <div class="explore-format-toggle">
            <button class="format-btn active" data-format="2">样式二</button>
            <button class="format-btn" data-format="1">样式一</button>
          </div>
        </div>
        <textarea id="exploreUrlPreview" placeholder="[{&quot;title&quot;:&quot;同人小说&quot;,&quot;url&quot;:&quot;...&quot;}]"></textarea>
      </div>
    </div>

    <div class="step-indicator">
      <span id="stepText">1/9: 书籍列表容器</span>
      <div id="fieldStatusSummary" class="field-status-summary"></div>
    </div>

    <main class="form-area">
      <div id="fieldContainer"></div>
    </main>

    <footer class="footer">
      <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary" disabled>上一步</button>
        <button id="nextBtn" class="btn btn-primary">下一步</button>
      </div>
      <button id="exportBtn" class="btn btn-success">导出 JSON</button>
      <button id="resetBtn" class="btn btn-danger">重置</button>
    </footer>

    <div id="exportModal" class="modal hidden">
      <div class="modal-content">
        <h3>导出 JSON</h3>
        <textarea id="jsonOutput" readonly></textarea>
        <div class="modal-actions">
          <button id="copyBtn" class="btn btn-primary">复制到剪贴板</button>
          <button id="downloadBtn" class="btn btn-success">下载 JSON</button>
          <button id="closeModalBtn" class="btn btn-secondary">关闭</button>
        </div>
      </div>
    </div>
  </div>
  <script src="explore-url-editor.js"></script>
  <script src="popup.js"></script>
</body>
</html>
