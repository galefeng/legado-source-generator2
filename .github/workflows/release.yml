name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify manifest versions match tag
        run: |
          CHROME_VERSION=$(jq -r .version src/manifest.json)
          FIREFOX_VERSION=$(jq -r .version src-firefox/manifest.json)

          if [ "$CHROME_VERSION" != "$VERSION" ]; then
            echo "src/manifest.json version($CHROME_VERSION) != tag version($VERSION)"
            exit 1
          fi

          if [ "$FIREFOX_VERSION" != "$VERSION" ]; then
            echo "src-firefox/manifest.json version($FIREFOX_VERSION) != tag version($VERSION)"
            exit 1
          fi

      - name: Build release archives
        run: |
          mkdir -p dist
          (cd src && zip -r "../dist/legado-source-generator-chrome-v${VERSION}.zip" . -x "*.DS_Store")
          (cd src-firefox && zip -r "../dist/legado-source-generator-firefox-v${VERSION}.zip" . -x "*.DS_Store" "web-ext-artifacts/*")

      - name: Generate release notes
        run: |
          PREV_TAG=$(git for-each-ref --sort=-version:refname --format='%(refname:short)' refs/tags | while read -r tag; do
            if [ "$tag" != "v${VERSION}" ]; then
              printf '%s' "$tag"
              break
            fi
          done)

          {
            printf '## 本次更新\n\n'
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --pretty='- %s' "${PREV_TAG}..v${VERSION}"
              printf '\n'
              printf 'Full Changelog: https://github.com/%s/compare/%s...v%s\n' "$GITHUB_REPOSITORY" "$PREV_TAG" "$VERSION"
            else
              git log --no-merges --pretty='- %s'
            fi
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            dist/legado-source-generator-chrome-v${{ env.VERSION }}.zip
            dist/legado-source-generator-firefox-v${{ env.VERSION }}.zip
