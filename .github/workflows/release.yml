name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify manifest versions match tag
        run: |
          CHROME_VERSION=$(jq -r .version src/manifest.json)
          FIREFOX_VERSION=$(jq -r .version src-firefox/manifest.json)

          if [ "$CHROME_VERSION" != "$VERSION" ]; then
            echo "src/manifest.json version($CHROME_VERSION) != tag version($VERSION)"
            exit 1
          fi

          if [ "$FIREFOX_VERSION" != "$VERSION" ]; then
            echo "src-firefox/manifest.json version($FIREFOX_VERSION) != tag version($VERSION)"
            exit 1
          fi

      - name: Build release archives
        run: |
          mkdir -p dist
          (cd src && zip -r "../dist/legado-source-generator-chrome-v${VERSION}.zip" . -x "*.DS_Store")
          (cd src-firefox && zip -r "../dist/legado-source-generator-firefox-v${VERSION}.zip" . -x "*.DS_Store" "web-ext-artifacts/*")

      - name: Generate release notes
        run: |
          PREV_TAG=$(git for-each-ref --sort=-version:refname --format='%(refname:short)' refs/tags | while read -r tag; do
            if [ "$tag" != "v${VERSION}" ]; then
              printf '%s' "$tag"
              break
            fi
          done)

          {
            printf '## 本次更新\n\n'
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..v${VERSION}"
              printf '\n'
              printf 'Full Changelog: https://github.com/%s/compare/%s...v%s\n' "$GITHUB_REPOSITORY" "$PREV_TAG" "$VERSION"
            else
              RANGE="v${VERSION}"
            fi

            git rev-list --no-merges --reverse "$RANGE" | while read -r commit; do
              SUBJECT=$(git show -s --format='%s' "$commit")
              BODY=$(git show -s --format='%b' "$commit")

              printf '\n- %s\n' "$SUBJECT"
              if [ -n "$BODY" ]; then
                printf '\n'
                printf '%s\n' "$BODY" | sed 's/^/  /'
              fi
            done
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            dist/legado-source-generator-chrome-v${{ env.VERSION }}.zip
            dist/legado-source-generator-firefox-v${{ env.VERSION }}.zip

  sync-gitee-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG_NAME="v${VERSION}"
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"

          # 1. 确保 Gitee 上存在对应 tag
          TAG_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/git/refs/tags/${TAG_NAME}?access_token=${GITEE_TOKEN}")

          if [ "$TAG_EXISTS" != "200" ]; then
            # 获取当前 tag 的 commit sha
            COMMIT_SHA=$(git rev-list -n1 "${TAG_NAME}")
            # 在 Gitee 创建 tag
            curl -s -X POST \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/git/tags" \
              -H "Content-Type: application/json" \
              -d "{
                \"access_token\": \"${GITEE_TOKEN}\",
                \"tag_name\": \"${TAG_NAME}\",
                \"message\": \"Release ${TAG_NAME}\",
                \"object\": \"${COMMIT_SHA}\",
                \"type\": \"commit\"
              }" > /dev/null

            # 创建 ref
            curl -s -X POST \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/git/refs" \
              -H "Content-Type: application/json" \
              -d "{
                \"access_token\": \"${GITEE_TOKEN}\",
                \"ref\": \"refs/tags/${TAG_NAME}\",
                \"sha\": \"${COMMIT_SHA}\"
              }" > /dev/null
          fi

          # 2. 检查 Gitee Release 是否已存在
          RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG_NAME}?access_token=${GITEE_TOKEN}")

          if [ "$RELEASE_EXISTS" == "200" ]; then
            echo "Gitee release ${TAG_NAME} already exists, skipping."
            exit 0
          fi

          # 3. 获取 GitHub Release 信息
          GITHUB_RELEASE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}")

          RELEASE_NAME=$(echo "$GITHUB_RELEASE" | jq -r '.name // "'"$TAG_NAME"'"')
          RELEASE_BODY=$(echo "$GITHUB_RELEASE" | jq -r '.body // ""')
          IS_PRERELEASE=$(echo "$GITHUB_RELEASE" | jq -r '.prerelease // false')

          # 4. 创建 Gitee Release
          curl -s -X POST \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"${RELEASE_NAME}\",
              \"body\": $(echo "$RELEASE_BODY" | jq -sR .),
              \"prerelease\": ${IS_PRERELEASE}
            }"

          echo "Gitee release ${TAG_NAME} created successfully."
